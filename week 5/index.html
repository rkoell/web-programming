<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Digital Business Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="photo-column">
            <img class="photo" src="initials.png" alt="initials as replacement for my photo">
        </div>
        <div class="top">
            <div class="info">
                <h2>Nathan Varnell</h2>
                <p>Title: Student</p>
                <h4>Arkansas Tech University</h4>
                <hr>
                <p>Phone: (123) 123-1234</p>
                <p>Email: nvarnell3@atu.edu</p>
                <a class="detail-link" href="https://www.atu.edu/stem/engineering/cis/"><p>Division of Computing Sciences</p></a>
            </div>   
        </div>
        <div class="bottom">
            <div class="qr">
                <img src="qrcode.png" alt="qr code">
            </div>
            <div class="qr-supplement">
                Scan to view my profile:
            </div>
        </div>
    </div>
</body>
