<!DOCTYPE html>
<html lang="en">
<head>
<!-- Character encoding -->
<meta charset="UTF-8" />
<!-- Mobile-friendly scaling -->
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Page title -->
<title>To-Do List (Portfolio Version)</title>
<!-- Link to CSS file -->
<link rel="stylesheet" href="style.css" />
</head>
<body>
<!-- Main card container -->
<main class="app">
<!-- Header section -->
<header class="header">
<h1>To-Do List</h1>
<p class="subtitle">DOM • Events • Validation • localStorage</p>
</header>
<!-- Form for adding tasks -->
<form id="taskForm" class="task-form">
<!-- Text input -->
<input
id="taskInput"
type="text"
placeholder="Add a task…"
autocomplete="off"
aria-label="Task input"
/>
<!-- Submit button (submits the form) -->
<button type="submit" class="btn primary">Add</button>
</form>
<!-- Inline error message area -->
<p id="errorMessage" class="error" aria-live="polite"></p>
<!-- Character counter -->
<span id="characterCounter">Characters: 0</span>
<!-- Controls row: counters + filters + clear buttons -->
<section class="controls">
<!-- Counters -->
<div class="counts" aria-label="Task counts">
<span id="totalCount">Total: 0</span>
<span id="doneCount">Completed: 0</span>
</div>
<!-- Filter buttons -->
<div class="filters" aria-label="Filters">
<button type="button" class="btn ghost active" data-filter="all">All</button>
<button type="button" class="btn ghost" data-filter="active">Active</button>
<button type="button" class="btn ghost" data-filter="completed">Completed</button>
</div>
<!-- Clear actions -->
<div class="actions" aria-label="Actions">
<button type="button" id="clearCompleted" class="btn danger">Clear Completed</button>
<button type="button" id="clearAll" class="btn danger">Clear All</button>
</div>
</section>
<!-- Search feature -->
 <div class="search-container">
    <input type="text" id="searchInput">
 </div>
<!-- List where tasks will appear -->
<ul id="taskList" class="task-list" aria-label="Task list"></ul>
<p id="noTasks">No tasks available.</p>
<!-- Footer hint -->
<footer class="footer">
Tip: Click a task to toggle done. Use Delete to remove it.
</footer>
</main>
<!-- Link to JS file (placed at end so DOM loads first) -->
<script src="script.js"></script>
</body>
</html>
